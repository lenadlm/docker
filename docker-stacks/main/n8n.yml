services:
  postgres:
    image: postgres:16-alpine
    container_name: n8n_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:?Must set N8N_DB_PASSWORD in .env}
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
    command: "postgres -c shared_buffers=128MB -c work_mem=16MB -c effective_cache_size=512MB"
    volumes:
      - /docker/n8n/postgres:/var/lib/postgresql/data
    networks:
      - internal_network
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n} -d ${N8N_DB_NAME:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  redis:
    image: redis:7-alpine
    container_name: n8n_redis
    restart: unless-stopped
    command: >
      redis-server --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - /docker/n8n/redis:/data
    networks:
      - internal_network
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?Must set N8N_DB_PASSWORD in .env}
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Must set N8N_ENCRYPTION_KEY in .env}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?Must set N8N_BASIC_AUTH_PASSWORD in .env}
      N8N_HOST: ${N8N_HOST_IP:-192.168.1.220}
      N8N_PORT: 5678
      WEBHOOK_URL: http://${N8N_HOST_IP:-192.168.1.220}:5678/
      N8N_SECURE_COOKIE: "false"
      N8N_PAYLOAD_SIZE_MAX: 16
      EXECUTIONS_DATA_MAX_SIZE: 32
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168
      NODE_OPTIONS: "--max-old-space-size=512"
      GENERIC_TIMEZONE: Africa/Nairobi
      TZ: Africa/Nairobi
    volumes:
      - /docker/n8n/n8n:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal_network
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5678/healthz', (r) => {process.exit(r.statusCode >= 200 && r.statusCode < 400 ? 0 : 1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  worker1:
    image: n8nio/n8n:latest
    container_name: n8n_worker1
    restart: unless-stopped
    command: worker
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?Must set N8N_DB_PASSWORD in .env}
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Must set N8N_ENCRYPTION_KEY in .env}
      N8N_PAYLOAD_SIZE_MAX: 16
      EXECUTIONS_DATA_MAX_SIZE: 32
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168
      NODE_OPTIONS: "--max-old-space-size=512"
      GENERIC_TIMEZONE: Africa/Nairobi
      TZ: Africa/Nairobi
    volumes:
      - /docker/n8n/n8n:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal_network
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: n8n_db_backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:?Must set N8N_DB_PASSWORD in .env}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - /docker/n8n/backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal_network
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

networks:
  internal_network:
    external: true