# /etc/fail2ban/action.d/crowdsec.conf
# Fail2Ban action: forward detections to CrowdSec LAPI only.
# NO direct firewall manipulation — CrowdSec is the enforcement engine.

[Definition]

# Action name shown in logs
actionname = crowdsec

# ── Ban: push decision to CrowdSec ──────────────────────────────────────────
# Duration is passed from the jail's bantime (converted to seconds by Fail2Ban
# as <bantime>).  Fall back to 4h if the variable is empty or zero.
actionban = \
    _DURATION="<bantime>"; \
    [ -z "$_DURATION" ] || [ "$_DURATION" -le 0 ] && _DURATION=14400; \
    cscli decisions add \
        --ip "<ip>" \
        --reason "fail2ban-<name>" \
        --type ban \
        --duration "${_DURATION}s" 2>/dev/null

# ── Unban: remove decision from CrowdSec ────────────────────────────────────
actionunban = \
    cscli decisions delete \
        --ip "<ip>" 2>/dev/null || true

# ── Intentionally left empty ─────────────────────────────────────────────────
# Fail2Ban normally uses these to insert/flush firewall rules.
# We do NOT want that here — CrowdSec's bouncer owns the firewall.
actionstart =
actionstop  =
actioncheck =

[Init]
# Default fallback ban duration (seconds) — overridden per-jail via bantime
bantime = 14400
