services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - external_network
    restart: unless-stopped

  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Nairobi
      - PASSWORD=${PASSWORD}
      - SUDO_PASSWORD=${SUDO_PASSWORD}
      - DEFAULT_WORKSPACE=/config/workspace
      - PWA_APPNAME=code-server
    networks:
      - external_network
    ports:
      - "8443:8443"
    volumes:
      - /docker/code-server/config:/config
      - /docker:/config/workspace/docker:rw
      - /mnt/shared:/config/workspace/shared:rw
    restart: unless-stopped

  copyparty:
    image: copyparty/ac:latest
    container_name: copyparty
    user: "1000:1000"
    ports:
      - "3923:3923"
    volumes:
      - /docker/copyparty/cfg:/cfg
      - /docker:/docker:rw
      - /home/leo:/home/leo:rw
      - /mnt/shared:/mnt/shared:rw
      - /mnt/media:/mnt/media:rw
    environment:
      LD_PRELOAD: /usr/lib/libmimalloc-secure.so.NOPE
      PYTHONUNBUFFERED: 1    
    networks:
      - external_network
    stop_grace_period: 15s
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    networks:
      - external_network
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    networks:
      - external_network
    ports:
      - 3300:3000
    volumes:
      - /docker/homepage/config:/app/config # Make sure your local config directory exists
      - /var/run/docker.sock:/var/run/docker.sock:ro # (optional) For docker integrations
    restart: unless-stopped

  filewizard:
    image: loredcast/filewizard:latest
    container_name: filewizard
    environment:
      - LOCAL_ONLY=True # False for Auth
      - SECRET_KEY= # set if using auth
      - UPLOADS_DIR=/app/uploads # inside the container
      - PROCESSED_DIR=/app/processed # inside the container
      - OMP_NUM_THREADS=1
      - DOWNLOAD_KOKORO_ON_STARTUP=true
    ports:
      - "6969:8000"
    networks:
      - external_network
    volumes:
      - /docker/filewizard/config:/app/config # settings.yml will be here
      - /docker/filewizard/data/uploads:/app/uploads
      - /docker/filewizard/data/processed:/app/processed
    restart: unless-stopped

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Nairobi
    networks:
      - internal_network
    volumes:
      - /docker/npm/data:/data
      - /docker/npm/letsencrypt:/etc/letsencrypt
    restart: unless-stopped
  
  tor:
    image: dockurr/tor
    container_name: tor
    ports:
      - 9050:9050
      - 9051:9051
    networks:
      - external_network
    volumes:
      - /docker/tor/config:/etc/tor
      - /docker/tor/data:/var/lib/tor
    restart: unless-stopped
      
networks:
  internal_network:
    external: true
  external_network:
    external: true
