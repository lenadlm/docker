services:

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: mpc
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_USERSPACE=false
    volumes:
      - /docker/tailscale:/var/lib/tailscale
    restart: unless-stopped

  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Nairobi
      - PASSWORD=${PASSWORD}
      - SUDO_PASSWORD=${SUDO_PASSWORD}
      - DEFAULT_WORKSPACE=/config/workspace
      - PWA_APPNAME=code-server
    ports:
      - 8443:8443
    volumes:
      - /docker/code-server/config:/config
      - /docker:/config/workspace/docker
      - /mnt/shared:/config/workspace/shared
    networks:
      - external_network
    restart: unless-stopped

  copyparty:
    image: copyparty/ac:latest
    container_name: copyparty
    user: "1000:1000"
    ports:
      - 3923:3923
    volumes:
      - /docker/copyparty/cfg:/cfg
      - /docker:/docker
      - /home/leo:/home/leo
      - /mnt/shared:/mnt/shared
      - /mnt/media:/mnt/media
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - external_network
    stop_grace_period: 15s
    restart: unless-stopped

  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    network_mode: service:tailscale
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /docker/dockhand/data:/app/data
    restart: unless-stopped
    depends_on:
      - tailscale

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    network_mode: service:tailscale
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    depends_on:
      - tailscale

  filewizard:
    image: loredcast/filewizard:latest
    container_name: filewizard
    environment:
      - LOCAL_ONLY=True
      - UPLOADS_DIR=/app/uploads
      - PROCESSED_DIR=/app/processed
      - OMP_NUM_THREADS=1
      - DOWNLOAD_KOKORO_ON_STARTUP=true
    ports:
      - 6969:8000
    volumes:
      - /docker/filewizard/config:/app/config
      - /docker/filewizard/data/uploads:/app/uploads
      - /docker/filewizard/data/processed:/app/processed
    networks:
      - external_network
    restart: unless-stopped

networks:
  external_network:
    external: true
