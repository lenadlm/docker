services:
  netbootxyz:
    image: ghcr.io/netbootxyz/netbootxyz
    container_name: netbootxyz
    environment:
      - MENU_VERSION=2.0.84
      - NGINX_PORT=80
      - WEB_APP_PORT=3300
    volumes:
      - /docker/netbootxyz/config:/config
      - /mnt/shared/assets:/assets
    networks:
      - external_network
    ports:
      - "3300:3000"
      - "69:69/udp"
      - "8380:80"
    restart: unless-stopped

networks:
  external_network:
    external: true
