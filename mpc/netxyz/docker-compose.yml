services:
  netbootxyz:
    image: ghcr.io/netbootxyz/netbootxyz
    container_name: netbootxyz
    environment:
      - MENU_VERSION=2.0.84
      - NGINX_PORT=80
      - WEB_APP_PORT=3000
    volumes:
      - /docker/netbootxyz/config:/config
      - /mnt/shared/assets:/assets
    ports:
      - "3000:3000"
      - "69:69/udp"
      - "8080:80"
    restart: unless-stopped
